<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="50%" stop-color="#111933"/>
      <stop offset="100%" stop-color="#0d1528"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="cardBg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#162040"/>
      <stop offset="100%" stop-color="#1a2848"/>
    </linearGradient>
    <linearGradient id="cardBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141e3a"/>
      <stop offset="100%" stop-color="#182644"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <clipPath id="bannerClip">
      <rect width="1200" height="400" rx="0"/>
    </clipPath>
  </defs>
  
  <g clip-path="url(#bannerClip)">
    <!-- Background -->
    <rect width="1200" height="400" fill="url(#bg)"/>
    
    <!-- Subtle grid pattern -->
    <g opacity="0.05" stroke="#60a5fa" stroke-width="0.5" fill="none">
      <line x1="0" y1="80" x2="1200" y2="80"/>
      <line x1="0" y1="160" x2="1200" y2="160"/>
      <line x1="0" y1="240" x2="1200" y2="240"/>
      <line x1="0" y1="320" x2="1200" y2="320"/>
      <line x1="200" y1="0" x2="200" y2="400"/>
      <line x1="400" y1="0" x2="400" y2="400"/>
      <line x1="600" y1="0" x2="600" y2="400"/>
      <line x1="800" y1="0" x2="800" y2="400"/>
      <line x1="1000" y1="0" x2="1000" y2="400"/>
    </g>

    <!-- ============================================ -->
    <!-- RIGHT SIDE: Skill module cards               -->
    <!-- ============================================ -->
    <g transform="translate(620, 32)">

      <!-- Card 1: Loss Reserve Analysis (available) -->
      <g filter="url(#cardShadow)">
        <rect x="0" y="0" width="260" height="78" rx="8" fill="url(#cardBg1)" stroke="#2d5a8e" stroke-width="0.8"/>
        <circle cx="22" cy="20" r="4" fill="#34d399"/>
        <text x="36" y="24" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#e2e8f0" font-weight="600">Loss Reserve Analysis</text>
        <!-- Mini triangle icon -->
        <g transform="translate(16, 36)" opacity="0.5">
          <rect x="0" y="0" width="16" height="10" rx="1.5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.6"/>
          <rect x="20" y="0" width="16" height="10" rx="1.5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.6"/>
          <rect x="40" y="0" width="16" height="10" rx="1.5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.6"/>
          <rect x="0" y="14" width="16" height="10" rx="1.5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.6"/>
          <rect x="20" y="14" width="16" height="10" rx="1.5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.6"/>
          <rect x="0" y="28" width="16" height="10" rx="1.5" fill="none" stroke="#3b82f6" stroke-width="0.6" stroke-dasharray="2,2"/>
        </g>
        <text x="90" y="50" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9.5" fill="#64748b">Chain Ladder · BF · Cape Cod</text>
        <text x="90" y="65" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9.5" fill="#64748b">IBNR · Diagnostics · Exhibits</text>
      </g>

      <!-- Card 2: Ratemaking Analysis (coming soon) -->
      <g filter="url(#cardShadow)">
        <rect x="280" y="0" width="260" height="78" rx="8" fill="url(#cardBg2)" stroke="#1e3050" stroke-width="0.8"/>
        <circle cx="302" cy="20" r="4" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="2,2"/>
        <text x="316" y="24" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#94a3b8" font-weight="600">Ratemaking Analysis</text>
        <!-- Mini bar chart icon -->
        <g transform="translate(296, 36)" opacity="0.35">
          <rect x="0" y="20" width="10" height="18" rx="1.5" fill="#3b82f6"/>
          <rect x="14" y="12" width="10" height="26" rx="1.5" fill="#3b82f6"/>
          <rect x="28" y="6" width="10" height="32" rx="1.5" fill="#3b82f6"/>
          <rect x="42" y="16" width="10" height="22" rx="1.5" fill="#3b82f6"/>
        </g>
        <text x="370" y="50" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9.5" fill="#475569">Trending · On-Level · Indications</text>
        <text x="370" y="65" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9.5" fill="#475569">Credibility · Expense Loading</text>
      </g>

      <!-- Card 3: Reinsurance Analysis (coming soon) -->
      <g filter="url(#cardShadow)">
        <rect x="0" y="94" width="260" height="78" rx="8" fill="url(#cardBg2)" stroke="#1e3050" stroke-width="0.8"/>
        <circle cx="22" cy="114" r="4" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="2,2"/>
        <text x="36" y="118" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#94a3b8" font-weight="600">Reinsurance Analysis</text>
        <!-- Mini layer diagram icon -->
        <g transform="translate(16, 130)" opacity="0.35">
          <rect x="0" y="0" width="52" height="8" rx="1.5" fill="#3b82f6"/>
          <rect x="0" y="12" width="52" height="8" rx="1.5" fill="#2563eb"/>
          <rect x="0" y="24" width="52" height="8" rx="1.5" fill="#1d4ed8"/>
        </g>
        <text x="90" y="144" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9.5" fill="#475569">Treaty · Facultative · Layers</text>
        <text x="90" y="159" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9.5" fill="#475569">Ceded Development · Pricing</text>
      </g>

      <!-- Card 4: Financial Statement Review (coming soon) -->
      <g filter="url(#cardShadow)">
        <rect x="280" y="94" width="260" height="78" rx="8" fill="url(#cardBg2)" stroke="#1e3050" stroke-width="0.8"/>
        <circle cx="302" cy="114" r="4" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="2,2"/>
        <text x="316" y="118" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#94a3b8" font-weight="600">Financial Statement Review</text>
        <!-- Mini document icon -->
        <g transform="translate(296, 130)" opacity="0.35">
          <rect x="0" y="0" width="40" height="32" rx="2" fill="none" stroke="#3b82f6" stroke-width="1.2"/>
          <line x1="8" y1="9" x2="32" y2="9" stroke="#3b82f6" stroke-width="1"/>
          <line x1="8" y1="16" x2="28" y2="16" stroke="#3b82f6" stroke-width="1"/>
          <line x1="8" y1="23" x2="24" y2="23" stroke="#3b82f6" stroke-width="1"/>
        </g>
        <text x="370" y="144" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9.5" fill="#475569">Schedule P · IRIS Ratios</text>
        <text x="370" y="159" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9.5" fill="#475569">SAP/GAAP · Hindsight Testing</text>
      </g>

      <!-- Legend -->
      <g transform="translate(0, 192)">
        <circle cx="6" cy="6" r="4" fill="#34d399"/>
        <text x="18" y="10" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9.5" fill="#64748b">Available</text>
        <circle cx="86" cy="6" r="4" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="2,2"/>
        <text x="98" y="10" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9.5" fill="#64748b">Coming Soon</text>
      </g>
    </g>

    <!-- ============================================ -->
    <!-- LEFT SIDE: Title area                        -->
    <!-- ============================================ -->
    <g transform="translate(60, 80)">
      <!-- Main title -->
      <text y="32" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" fill="#f0f6ff" font-weight="700" letter-spacing="-0.5">Actuarial Skills</text>
      <text y="72" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" fill="#f0f6ff" font-weight="700" letter-spacing="-0.5">for Claude</text>
      
      <!-- Accent line -->
      <rect y="92" width="60" height="3" rx="1.5" fill="url(#accent)"/>
      
      <!-- Subtitle -->
      <text y="125" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#94a3b8" font-weight="400">Open-source skills for P&amp;C insurance actuaries.</text>
      <text y="148" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#94a3b8" font-weight="400">Reserving, ratemaking, reinsurance, and beyond.</text>
    </g>

    <!-- Bottom bar: tech context badges -->
    <g transform="translate(60, 340)">
      <rect x="0" y="0" width="90" height="26" rx="13" fill="#1e3a5f" stroke="#2d5a8e" stroke-width="0.8"/>
      <text x="45" y="17" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9.5" fill="#93c5fd" text-anchor="middle">Claude.ai</text>
      
      <rect x="100" y="0" width="105" height="26" rx="13" fill="#1e3a5f" stroke="#2d5a8e" stroke-width="0.8"/>
      <text x="152" y="17" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9.5" fill="#93c5fd" text-anchor="middle">Claude Code</text>
      
      <rect x="215" y="0" width="100" height="26" rx="13" fill="#1e3a5f" stroke="#2d5a8e" stroke-width="0.8"/>
      <text x="265" y="17" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9.5" fill="#93c5fd" text-anchor="middle">MIT License</text>
      
      <rect x="325" y="0" width="80" height="26" rx="13" fill="#1e3a5f" stroke="#2d5a8e" stroke-width="0.8"/>
      <text x="365" y="17" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9.5" fill="#93c5fd" text-anchor="middle">Python</text>
    </g>

    <!-- Ambient glow effects -->
    <circle cx="750" cy="200" r="250" fill="#3b82f6" opacity="0.03"/>
    <circle cx="200" cy="350" r="200" fill="#3b82f6" opacity="0.02"/>
  </g>
</svg>